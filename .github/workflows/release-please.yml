name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Uses the built-in GITHUB_TOKEN — no manual secret needed.
      # On each push to main it opens/updates a "release PR" with the bumped
      # version + CHANGELOG; merging that PR creates the git tag vX.Y.Z and a
      # GitHub Release. Distribution is via Git URL, so there is no npm publish.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
