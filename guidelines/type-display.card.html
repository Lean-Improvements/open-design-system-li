<!-- @dsCard group="Type" viewport="700x300" name="Display Scale" subtitle="Editorial display — weight 400, negative tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--lp-bg); font-family: var(--font-sans); color: var(--lp-ink); }
  .item { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--lp-line); }
  .item:last-child { border-bottom: none; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--lp-muted); width: 150px; flex-shrink: 0; }
  .d { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.04em; line-height: 1.1; }
</style>
</head>
<body>
  <div class="item"><span class="spec">display-mega · 72 / 400</span><span class="d" style="font-size:54px">Ship faster</span></div>
  <div class="item"><span class="spec">display-lg · 36 / 400</span><span class="d" style="font-size:36px">Workspace overview</span></div>
  <div class="item"><span class="spec">display-md · 26 / 400</span><span class="d" style="font-size:26px">Active epics this quarter</span></div>
  <div class="item"><span class="spec">display-sm · 22 / 400</span><span class="d" style="font-size:22px">Key results &amp; metrics</span></div>
</body>
</html>
