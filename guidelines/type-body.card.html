<!-- @dsCard group="Type" viewport="700x290" name="Body, Labels & Code" subtitle="Body sans, uppercase eyebrow, JetBrains Mono" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--lp-bg); font-family: var(--font-sans); color: var(--lp-ink); }
  .item { padding: 9px 0; border-bottom: 1px solid var(--lp-line); }
  .item:last-child { border-bottom: none; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--lp-muted); display: block; margin-bottom: 4px; }
  .title-md { font-size: 18px; font-weight: 600; }
  .body-md { font-size: 16px; font-weight: 400; line-height: 1.5; color: var(--lp-body); }
  .body-sm { font-size: 14px; color: var(--lp-body); }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.24em; text-transform: uppercase; color: var(--lp-muted); }
  .code { font-family: var(--font-mono); font-size: 13px; background: var(--lp-surface); border: 1px solid var(--lp-line); border-radius: var(--radius-md); padding: 8px 12px; display: inline-block; color: var(--lp-ink); }
</style>
</head>
<body>
  <div class="item"><span class="spec">title-md · 18 / 600</span><div class="title-md">Component title</div></div>
  <div class="item"><span class="spec">body-md · 16 / 400 / 1.5</span><div class="body-md">Default running text for descriptions, paragraphs and table cells.</div></div>
  <div class="item"><span class="spec">caption-uppercase · 11 / 600 / 0.24em</span><div class="eyebrow">Smart management</div></div>
  <div class="item"><span class="spec">code · JetBrains Mono · 13 / 400</span><div class="code">npm run dev --workspace=frontend</div></div>
</body>
</html>
