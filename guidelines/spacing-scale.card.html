<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base unit · 80px section rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--lp-bg); font-family: var(--font-sans); color: var(--lp-ink); }
  .row { display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
  .col { text-align: center; }
  .bar { background: var(--lp-primary); border-radius: var(--radius-xs); width: 28px; }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--lp-muted); margin-top: 6px; }
  .t { font-size: 11px; color: var(--lp-ink); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="t">xxs</div><div class="n">4</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="t">xs</div><div class="n">8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="t">sm</div><div class="n">12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="t">base</div><div class="n">16</div></div>
    <div class="col"><div class="bar" style="height:20px"></div><div class="t">md</div><div class="n">20</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="t">lg</div><div class="n">24</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="t">xl</div><div class="n">32</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="t">xxl</div><div class="n">48</div></div>
    <div class="col"><div class="bar" style="height:80px"></div><div class="t">section</div><div class="n">80</div></div>
  </div>
</body>
</html>
