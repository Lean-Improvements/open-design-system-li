<!-- @startingPoint section="Example SaaS App" subtitle="App shell — sidebar + dashboard" viewport="1280x800" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lean Improvements SaaS — Example App</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  #root { height: 100vh; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="DashboardScreen.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const TITLES = { dashboard: "Dashboard", okrs: "OKRs", epics: "Epics", features: "Features", roadmaps: "Roadmaps", settings: "Settings" };

    function App() {
      const [active, setActive] = useState("dashboard");
      const [dark, setDark] = useState(false);

      useEffect(() => {
        document.documentElement.classList.toggle("dark", dark);
      }, [dark]);

      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });

      return (
        <div className="app-shell" style={{ display: "flex", height: "100vh", overflow: "hidden" }}>
          <Sidebar active={active} onNavigate={setActive} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
            {/* Top bar */}
            <div style={{ height: 64, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 32px", borderBottom: "1px solid var(--lp-line)", background: "var(--lp-bg)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, background: "var(--lp-surface)", border: "1px solid var(--lp-line)", borderRadius: 8, padding: "0 12px", height: 40, width: 320, maxWidth: "40%" }}>
                <i data-lucide="search" style={{ width: 16, height: 16, color: "var(--lp-muted)" }}></i>
                <input placeholder="Search epics, OKRs, features…" style={{ border: "none", outline: "none", background: "transparent", fontFamily: "var(--font-sans)", fontSize: 14, color: "var(--lp-ink)", width: "100%" }} />
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <button onClick={() => setDark(!dark)} title="Toggle theme" style={{ width: 40, height: 40, display: "flex", alignItems: "center", justifyContent: "center", background: "transparent", border: "1px solid var(--lp-line)", borderRadius: 8, color: "var(--lp-body)", cursor: "pointer" }}>
                  <i data-lucide={dark ? "sun" : "moon"} style={{ width: 18, height: 18 }}></i>
                </button>
                <button title="Notifications" style={{ width: 40, height: 40, display: "flex", alignItems: "center", justifyContent: "center", background: "transparent", border: "1px solid var(--lp-line)", borderRadius: 8, color: "var(--lp-body)", cursor: "pointer" }}>
                  <i data-lucide="bell" style={{ width: 18, height: 18 }}></i>
                </button>
              </div>
            </div>
            {/* Content */}
            <main style={{ flex: 1, overflow: "auto", padding: 32, background: "var(--lp-bg)" }}>
              {active === "dashboard" ? <DashboardScreen /> : <PlaceholderScreen title={TITLES[active]} />}
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
